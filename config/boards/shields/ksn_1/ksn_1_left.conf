CONFIG_NFCT_PINS_AS_GPIOS=y
# central 역할은 오른쪽으로 이전함 (128-포지션 BLE 한계 회피 목적)
# CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_BATTERY_REPORTING=y
# 캡스락/상태 LED는 config/src/ksn1_peripheral_indicators.c 커스텀 드라이버가 담당함
# (ZMK 코어 indicator_leds.c 는 central 전용이라 peripheral인 왼쪽에선 못 씀 -
#  자세한 내용은 ksn_1_left.overlay 주석 참고). 아래 두 옵션은 그 커스텀 드라이버의
# Kconfig(CONFIG_KSN1_PERIPHERAL_INDICATORS)가 select 로도 켜주지만 명시적으로 남겨둠.
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ZMK_SPLIT_PERIPHERAL_HID_INDICATORS=y
# 백라이트 LED만 비활성화 요청 - 캡스락/상태 LED는 유지
CONFIG_ZMK_BACKLIGHT=n
# CONFIG_PWM=y
# CONFIG_ZMK_BACKLIGHT_ON_START=y
# CONFIG_ZMK_BACKLIGHT_BRT_START=40
# CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y
CONFIG_INDICATOR_LED_WIDGET=n
# CONFIG_INDICATOR_LED_SHOW_BATTERY_ON_BOOT=y
# CONFIG_INDICATOR_LED_SHOW_BLE=y
# CONFIG_INDICATOR_LED_SHOW_PERIPHERAL_BLE=n
# CONFIG_INDICATOR_LED_SHOW_LAYER_CHANGE=n
