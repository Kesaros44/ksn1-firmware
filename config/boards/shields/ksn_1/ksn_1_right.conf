CONFIG_NFCT_PINS_AS_GPIOS=y

# DEBUG: col7-10(RCTRL/LEFT/DOWN/RIGHT) 미동작 원인 확인용
# USB 로깅 활성화 + ZMK_LOG_LEVEL=DBG 는 build.yaml 의 zmk-usb-logging snippet 이 자동으로 처리함
# (ZMK 공식 문서: https://zmk.dev/docs/development/usb-logging)
# CONFIG_LOG_DEFAULT_LEVEL 은 절대 여기서 수동 설정하지 말 것:
#   Zephyr 전역 기본 로그레벨이라 USB 드라이버(nrf_usbd_common) 등
#   무관한 저수준 모듈까지 DEBUG로 켜져서 로그 버퍼가 넘쳐(messages dropped)
#   정작 필요한 로그가 유실됨

# TEST: encoder driver disabled to isolate col7-10 (RCTRL/LEFT/DOWN/RIGHT) issue
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_RGB_UNDERGLOW=n
# LED 비활성화 요청으로 백라이트 disable 처리
CONFIG_ZMK_BACKLIGHT=n
