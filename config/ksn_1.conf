# --- Keyboard General ---
CONFIG_ZMK_KEYBOARD_NAME="KSN1"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=y

# --- Power Management ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# --- Battery Reporting ---
CONFIG_ZMK_BATTERY_REPORTING=y

# --- Bluetooth (BLE) ---
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Backlight (P0.06 단색 LED) ---
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_ON_START=y
CONFIG_ZMK_BACKLIGHT_BRT_START=50
CONFIG_ZMK_BACKLIGHT_BRT_STEP=10

# --- RGB Underglow (캡스락 P0.02 WS2812용) ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_SPI=y
CONFIG_LED_STRIP=y  # <--- WS2812_STRIP 대신 이걸 써야 합니다

# RGB 초기 설정
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50
