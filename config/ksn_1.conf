# --- Keyboard General ---
CONFIG_ZMK_KEYBOARD_NAME="KSN1"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=y

# --- Power Management ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# --- Battery Reporting ---
CONFIG_ZMK_BATTERY_REPORTING=y

# --- Bluetooth (BLE) ---
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Backlight ---
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_ON_START=y
CONFIG_ZMK_BACKLIGHT_BRT_START=50
CONFIG_ZMK_BACKLIGHT_BRT_STEP=10

CONFIG_PWM=y
CONFIG_BACKLIGHT=y

# --- RGB Underglow ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_LED_STRIP=y

CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50

# --- (추가) 안정성/호환성 ---
CONFIG_GPIO=y
CONFIG_PINCTRL=y
