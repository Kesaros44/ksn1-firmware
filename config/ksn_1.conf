---

## 왜 이게 필요한가
```
CONFIG_ZMK_BACKLIGHT=y   → ZMK backlight 코드 컴파일
CONFIG_PWM=y             → nRF PWM 하드웨어 드라이버 활성화
CONFIG_PWM_LED=y         → pwm-leds 디바이스 드라이버 등록
                              ↑
                         이게 없으면 __device_dts_ord_XX 심볼이
                         생성되지 않아서 링커 에러 발생
