# ksn_1.conf — 공통 설정
 
CONFIG_ZMK_KEYBOARD_NAME="KSN1"
CONFIG_ZMK_SPLIT=y
 
# 전원
# CONFIG_SOC_DCDC_NRF52X=n
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
 
# 배터리 (분배기는 dtsi vbatt 노드로 설정)
CONFIG_ZMK_BATTERY_REPORTING=y
 
# BLE
CONFIG_BT=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
