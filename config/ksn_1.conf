# --- Keyboard General ---
CONFIG_ZMK_KEYBOARD_NAME="KSN1"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=y

# --- Power Management ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# --- Battery Reporting ---
CONFIG_ZMK_BATTERY_REPORTING=y

# --- Bluetooth (BLE) ---
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Backlight (P0.06 단색 LED용) ---
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_ON_START=y
CONFIG_ZMK_BACKLIGHT_BRT_START=50
CONFIG_ZMK_BACKLIGHT_BRT_STEP=10
CONFIG_PWM=y

# --- RGB Underglow (캡스락 P0.02 RGB용) ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_LED_STRIP=y

# 🔥 빌드 에러 해결을 위해 이 줄을 추가합니다
# nice_nano에 없는 전원 차단 기능을 찾지 않도록 설정합니다.
CONFIG_ZMK_EXT_POWER=n

# RGB 초기 설정
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50
