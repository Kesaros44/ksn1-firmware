# Keyboard
CONFIG_ZMK_KEYBOARD_NAME="KSN1"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE=y

# Power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Battery
CONFIG_ZMK_BATTERY_REPORTING=y

# BLE
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- [1] 백라이트 (일반 키들 P0.06 단색 LED용) ---
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_ON_START=y
CONFIG_ZMK_BACKLIGHT_BRT_START=50
CONFIG_ZMK_BACKLIGHT_BRT_STEP=10

# --- [2] RGB Underglow (캡스락 P0.02 WS2812용) ---
# 최신 ZMK(Main) 빌드 에러 방지를 위해 아래 3개 필수
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_SPI=y

# RGB 초기 설정: 켜진 상태로 시작
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50
# 에너지를 아끼려면 레이어 전환 시에만 켜지게 할 수도 있습니다.
