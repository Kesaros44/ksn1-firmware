name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build-matrix: |
        {
          "include": [
            { "board": "nice_nano_v2", "shield": "ksn_1_left" },
            { "board": "nice_nano_v2", "shield": "ksn_1_right" }
          ]
        }
