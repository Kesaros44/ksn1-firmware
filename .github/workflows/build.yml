name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Cache west modules
        uses: actions/cache@v3
        with:
          path: |
            modules
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr Export
        run: west zephyr-export
      - name: Build Left
        run: west build -s zmk/app -b nice_nano -- -DSHIELD=ksn_1_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Left
        run: cp build/zephyr/zmk.uf2 ksn_1_left.uf2
      - name: Build Right
        run: |
          rm -rf build
          west build -s zmk/app -b nice_nano -- -DSHIELD=ksn_1_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Right
        run: cp build/zephyr/zmk.uf2 ksn_1_right.uf2
      - name: Archive Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ksn1_firmware
          path: |
            ksn_1_left.uf2
            ksn_1_right.uf2
